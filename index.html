<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      #presentation-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #slide-frame {
        flex-grow: 1;
        border: none;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="presentation-container">
      <!-- Progress Bar -->
      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>

      <!-- Slide Viewer -->
      <iframe id="slide-frame" src="slides/intro.html"></iframe>

      <!-- Signature -->
      <a
        href="https://yel-cv-portfolio.vercel.app/"
        target="_blank"
        class="signature-badge"
      >
        <div class="avatar">YEL</div>
        <div class="text">Conçu par YEL</div>
      </a>

      <!-- Unified Footer -->
      <footer class="main-footer" id="main-footer">
        <div class="footer-logo-left" id="footer-logo-left">
          <img src="assets/guce.png" alt="GUCE CI" class="footer-logo" />
        </div>

        <!-- Controls -->
        <div class="controls-container" id="controls">
          <button
            id="prev-btn"
            class="control-btn"
            onclick="prevSlide()"
            disabled
          >
            <iconify-icon icon="mdi:chevron-left"></iconify-icon>
          </button>
          <div class="slide-counter">
            <select
              id="slide-selector"
              class="slide-selector"
              onchange="jumpToSlide(this.value)"
            >
              <!-- Options generated by JS -->
            </select>
            / <span id="total-slides"></span>
          </div>
          <button id="next-btn" class="control-btn" onclick="nextSlide()">
            <iconify-icon icon="mdi:chevron-right"></iconify-icon>
          </button>
        </div>

        <div class="footer-logo-right" id="footer-logo-right">
          <div class="marabu-brand" id="marabu-brand">
            <img src="assets/marabou logo.png" alt="MARABU" class="footer-logo" />
          </div>
        </div>
      </footer>
    </div>

    <script>
      const slides = [
        "slides/intro.html",
        "slides/methodes.html",
        "slides/grille.html",
        "slides/frictions.html",
        "slides/audit_final.html"
      ];

      let currentIndex = 0;
      const frame = document.getElementById("slide-frame");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const progressBar = document.getElementById("progress-bar");
      const signature = document.querySelector(".signature-badge");
      const slideSelector = document.getElementById("slide-selector");
      const logoLeft = document.getElementById("footer-logo-left");
      const logoRight = document.getElementById("footer-logo-right");
      const mainFooter = document.getElementById("main-footer");
      const totalSlidesSpan = document.getElementById("total-slides");

      // Initialize slide selector and total count
      totalSlidesSpan.textContent = slides.length;
      slides.forEach((_, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = index + 1;
        slideSelector.appendChild(option);
      });

      function updateUI() {
        frame.src = slides[currentIndex];
        slideSelector.value = currentIndex;
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === slides.length - 1;

        const progress = ((currentIndex + 1) / slides.length) * 100;
        progressBar.style.width = progress + "%";

        // Signature and Logos visibility: only hide logos on slide 1 (page de garde)
        const isHomePage = currentIndex === 0;
        signature.style.display = isHomePage ? "flex" : "none";
        logoLeft.style.visibility = isHomePage ? "hidden" : "visible";
        logoRight.style.visibility = isHomePage ? "hidden" : "visible";

        if (isHomePage) {
          mainFooter.style.bottom = "70px";
          mainFooter.style.background = "transparent";
          mainFooter.style.border = "none";
          mainFooter.style.height = "0px";
        } else {
          mainFooter.style.bottom = "0px";
          mainFooter.style.background = "#fff";
          mainFooter.style.height = "80px";
          mainFooter.style.borderTop = "1px solid rgba(0,0,0,0.05)";
        }
      }

      function jumpToSlide(index) {
        currentIndex = parseInt(index);
        updateUI();
      }

      function nextSlide() {
        if (currentIndex < slides.length - 1) {
          currentIndex++;
          updateUI();
        }
      }

      function prevSlide() {
        if (currentIndex > 0) {
          currentIndex--;
          updateUI();
        }
      }

      // Keyboard navigation
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" || e.key === " ") nextSlide();
        if (e.key === "ArrowLeft") prevSlide();
      });

      // Handle messages from slides (e.g., to hide footer during Labs)
      window.addEventListener("message", (e) => {
        if (e.data.action === "toggleFooter") {
          mainFooter.style.display = e.data.visible ? "grid" : "none";
          // Restore signature only if it's the home page
          if (currentIndex === 0) {
            signature.style.display = e.data.visible ? "flex" : "none";
          }
        }
      });

      // Initialize progress
      updateUI();
    </script>
  </body>
</html>
