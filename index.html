<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formation GUCE-CI — Module 6 : Analyse Heuristique Avancée</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #f0f4f8;
        }
        #presentation-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #slide-frame {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="presentation-container">
        <!-- Progress Bar -->
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <!-- Slide Viewer -->
        <iframe id="slide-frame" src="slides/intro.html"></iframe>

        <!-- Signature -->
        <a href="https://yel-cv-portfolio.vercel.app/" target="_blank" class="signature-badge" id="sig-badge">
            <div class="avatar">YEL</div>
            <div class="text">Conçu par YEL</div>
        </a>

        <!-- Controls -->
        <div class="controls-container" id="controls">
            <button id="prev-btn" class="control-btn" onclick="prevSlide()" disabled title="Précédent (Flèche Gauche)">
                <iconify-icon icon="mdi:chevron-left"></iconify-icon>
            </button>
            <div class="slide-counter">
                <select id="slide-selector" class="slide-selector" onchange="jumpToSlide(this.value)">
                    <!-- Options generated by JS -->
                </select>
                <span id="total-count">/ 4</span>
            </div>
            <button id="next-btn" class="control-btn" onclick="nextSlide()" title="Suivant (Flèche Droite / Espace)">
                <iconify-icon icon="mdi:chevron-right"></iconify-icon>
            </button>
        </div>
    </div>

    <script>
        const slides = [
            "slides/intro.html",
            "slides/methodes.html",
            "slides/grille.html",
            "slides/frictions.html"
        ];

        let currentIndex = 0;
        const frame = document.getElementById("slide-frame");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const progressBar = document.getElementById("progress-bar");
        const signature = document.getElementById("sig-badge");
        const slideSelector = document.getElementById("slide-selector");
        const totalCount = document.getElementById("total-count");

        // Initialize slide selector
        function initSelector() {
            slideSelector.innerHTML = '';
            slides.forEach((_, index) => {
                const option = document.createElement("option");
                option.value = index;
                option.textContent = index + 1;
                slideSelector.appendChild(option);
            });
            totalCount.textContent = `/ ${slides.length}`;
        }

        function updateUI() {
            // Fade effect
            frame.style.opacity = 0;
            setTimeout(() => {
                frame.src = slides[currentIndex];
                frame.style.opacity = 1;
            }, 150);

            slideSelector.value = currentIndex;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === slides.length - 1;

            const progress = ((currentIndex + 1) / slides.length) * 100;
            progressBar.style.width = progress + "%";

            // Signature visibility: only on slide 1
            signature.style.display = currentIndex === 0 ? "flex" : "none";
        }

        function jumpToSlide(index) {
            currentIndex = parseInt(index);
            updateUI();
        }

        function nextSlide() {
            if (currentIndex < slides.length - 1) {
                currentIndex++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        // Keyboard navigation
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight" || e.key === " ") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        });

        initSelector();
        updateUI();
    </script>
</body>
</html>
