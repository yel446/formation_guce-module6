<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        background-image: url('../assets/pattern.png');
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        padding: 60px 80px;
        height: 100vh;
        overflow: hidden;
        background-color: white;
      }
      .header {
        display: flex;
        justify-content: flex-start;
        margin-bottom: 60px;
      }
      .marabu-logo-container {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .marabu-logo {
        height: 70px;
      }
      .marabu-text {
        font-size: 24px;
        font-weight: 800;
        color: var(--primary);
        line-height: 1;
      }
      .marabu-text span {
        color: #8bc34a;
      }
      .main-content {
        display: flex;
        align-items: center;
        position: relative;
        margin-top: 40px;
      }
      .title-box {
        background: #1e3a44;
        color: white;
        padding: 60px 80px 60px 60px;
        width: 75%;
        position: relative;
        z-index: 2;
      }
      .title-box h1 {
        font-size: 42px;
        font-weight: 800;
        line-height: 1.2;
        margin: 0;
      }
      .accent-line {
        position: absolute;
        bottom: 40px;
        right: 150px;
        width: 120px;
        height: 5px;
        background: #8bc34a;
      }
      .module-group {
        position: absolute;
        right: 0;
        display: flex;
        align-items: flex-end;
        gap: 20px;
        z-index: 1;
      }
      .module-label {
        font-size: 28px;
        font-weight: 700;
        color: #1e3a44;
        margin-bottom: 60px;
      }
      .module-number {
        font-size: 400px;
        font-weight: 800;
        color: #1e3a44;
        line-height: 0.8;
        letter-spacing: -20px;
      }
      .footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        width: 100%;
        padding-bottom: 20px; /* Leave space for navigation capsule */
      }
      .guce-logo {
        height: 80px;
      }
      .qr-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }
      .qr-code {
        height: 70px;
      }
      .website-link {
        font-size: 20px;
        font-weight: 700;
        color: #1e3a44;
        text-decoration: none;
      }
      .website-link span {
        color: #8bc34a;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="marabu-logo-container">
        <img src="../assets/marabou logo.png" alt="Marabu Logo" class="marabu-logo" />
      </div>
    </div>

    <div class="main-content">
      <div class="title-box">
        <h1>Analyse Heuristique Avancée<br />(Standards Professionnels)</h1>
        <div class="accent-line"></div>
      </div>
      <div class="module-group">
        <span class="module-label">MODULE</span>
        <span class="module-number">6</span>
      </div>
    </div>

    <div class="footer">
      <img src="../assets/guce.png" alt="GUCE Logo" class="guce-logo" />
      <div class="qr-section">
        <img src="../assets/qr-code-marabou.png" alt="QR Code" class="qr-code" />
      </div>
    </div>
  </body>
</html>
