<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      :root { --p-high: #e74c3c; --p-med: #f39c12; --p-low: #27ae60; --bg-gray: #f8fafc; --accent: #8bc34a; }
      .slide-content { background: white !important; padding: 0 !important; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
      
      .header { background: var(--primary); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 100; }
      .header h2 { font-size: 18px; font-weight: 800; margin: 0; display: flex; align-items: center; gap: 12px; }
      
      .main-container { display: grid; grid-template-columns: 1fr 380px; flex-grow: 1; overflow: hidden; background: var(--bg-gray); }

      /* Audit Grid Pane */
      .audit-pane { padding: 30px; overflow-y: auto; background: white; }
      .pane-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
      .pane-title { font-size: 16px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; }
      
      .audit-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
      .audit-table th { text-align: left; padding: 12px; border-bottom: 2px solid var(--accent); color: var(--primary); font-weight: 800; font-size: 11px; text-transform: uppercase; }
      .audit-table td { padding: 15px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }

      .crit-info h4 { margin: 0; font-size: 13px; color: var(--primary); font-weight: 800; }
      .crit-info p { margin: 4px 0 0 0; font-size: 10px; color: #64748b; line-height: 1.4; font-style: italic; }

      .input-group { margin-bottom: 15px; }
      .input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 12px; box-sizing: border-box; }
      .input:focus { border-color: var(--accent); outline: none; }
      
      .sev-select { padding: 8px; border-radius: 8px; font-weight: 800; border: 2px solid #e2e8f0; font-size: 13px; width: 60px; cursor: pointer; }
      .s0 { color: #94a3b8; } .s1 { color: #2ecc71; } .s2 { color: #f1c40f; } .s3 { color: #e67e22; } .s4 { color: #e74c3c; }

      /* Kanban Pane */
      .kanban-pane { background: #f1f5f9; border-left: 1px solid #e2e8f0; padding: 25px; overflow-y: auto; }
      .kanban-header { font-size: 12px; font-weight: 800; color: var(--primary); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
      
      .kanban-col { background: #e2e8f0; border-radius: 18px; padding: 15px; margin-bottom: 20px; min-height: 120px; }
      .col-title { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
      .high-col .col-title { color: var(--p-high); }
      .med-col .col-title { color: var(--p-med); }
      .low-col .col-title { color: var(--p-low); }

      .reco-card { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 4px solid #ccc; animation: slideIn 0.3s ease; }
      .reco-card h4 { font-size: 11px; font-weight: 800; margin: 0 0 5px 0; color: var(--primary); }
      .reco-card p { font-size: 10px; color: #475569; margin: 0; line-height: 1.4; border-top: 1px solid #f8f9fa; padding-top: 8px; margin-top: 8px; font-style: italic; }

      /* App Modal */
      .app-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 10000; }
      .app-modal-content { width: 100%; height: 100%; position: relative; }
      .close-app { position: absolute; top: 20px; right: 30px; background: #e74c3c; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 28px; cursor: pointer; z-index: 11000; }

      .btn-action { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
      .btn-action:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
  </head>
  <body class="slide-content">
    <div class="header">
      <h2><iconify-icon icon="mdi:clipboard-pulse"></iconify-icon> Workspace : Audit Bastien & Scapin</h2>
      <button class="btn-action" onclick="openApp()">
         <iconify-icon icon="mdi:rocket-launch"></iconify-icon> Ouvrir l'App à Auditer (Plein Écran)
      </button>
    </div>

    <div class="main-container">
      <!-- Audit Grid -->
      <div class="audit-pane">
        <div class="pane-header">
           <div class="pane-title"><iconify-icon icon="mdi:table-edit"></iconify-icon> Grille d'Audit Détaillée</div>
           <button class="btn-action" style="background: var(--primary); font-size: 11px; padding: 8px 20px;" onclick="window.print()">Exporter PDF</button>
        </div>
        
        <table class="audit-table">
          <thead>
            <tr>
              <th style="width: 180px;">Critère</th>
              <th>Problèmes & Recommandations</th>
              <th style="width: 80px;">Sévérité</th>
            </tr>
          </thead>
          <tbody id="audit-body"></tbody>
        </table>
      </div>

      <!-- Kanban -->
      <div class="kanban-pane">
        <div class="kanban-header">Backlog UX Priorisé</div>
        <div class="kanban-col high-col"><div class="col-title">🔴 Haute Priorité</div><div id="col-high"></div></div>
        <div class="kanban-col med-col"><div class="col-title">🟠 Moyenne Priorité</div><div id="col-med"></div></div>
        <div class="kanban-col low-col"><div class="col-title">🟢 Basse Priorité</div><div id="col-low"></div></div>
      </div>
    </div>

    <!-- Full Screen App Modal -->
    <div id="app-overlay" class="app-modal-overlay">
       <div class="app-modal-content">
          <button class="close-app" onclick="closeApp()">×</button>
          <iframe src="lab/complex_bad_app.html" style="width: 100%; height: 100%; border: none;"></iframe>
       </div>
    </div>

    <script>
      const criteria = [
        { name: "1. Guidage", def: "Moyens pour conseiller et orienter." },
        { name: "2. Charge de travail", def: "Réduire l'effort mental et mémoriel." },
        { name: "3. Contrôle explicite", def: "Maîtrise utilisateur sur les actions système." },
        { name: "4. Adaptabilité", def: "Flexibilité selon l'usage et l'utilisateur." },
        { name: "5. Gestion des erreurs", def: "Prévenir et corriger simplement." },
        { name: "6. Homogénéité", def: "Cohérence interne des choix de conception." },
        { name: "7. Signifiance des codes", def: "Adéquation codes et signification." },
        { name: "8. Compatibilité", def: "Accord entre tâche réelle et logique système." }
      ];

      let auditData = Array(8).fill(null).map(() => ({ prob: "", reco: "", sev: 0 }));

      function init() {
        const body = document.getElementById('audit-body');
        criteria.forEach((c, i) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>
               <div class="crit-info">
                  <h4>${c.name}</h4>
                  <p>${c.def}</p>
               </div>
            </td>
            <td>
               <input type="text" class="input" placeholder="Défaut identifié..." id="prob-${i}" oninput="updateState(${i})">
               <input type="text" class="input" placeholder="Recommandation..." id="reco-${i}" oninput="updateState(${i})" style="margin-top: 8px;">
            </td>
            <td>
               <select class="sev-select s0" id="sev-${i}" onchange="updateState(${i})">
                  <option value="0" class="s0">0</option>
                  <option value="1" class="s1">1</option>
                  <option value="2" class="s2">2</option>
                  <option value="3" class="s3">3</option>
                  <option value="4" class="s4">4</option>
               </select>
            </td>
          `;
          body.appendChild(row);
        });
      }

      function updateState(i) {
        const prob = document.getElementById('prob-' + i).value;
        const reco = document.getElementById('reco-' + i).value;
        const sev = parseInt(document.getElementById('sev-' + i).value);
        
        auditData[i] = { prob, reco, sev };
        const sel = document.getElementById('sev-' + i);
        sel.className = 'sev-select s' + sev;
        
        refreshKanban();
      }

      function refreshKanban() {
        document.getElementById('col-high').innerHTML = '';
        document.getElementById('col-med').innerHTML = '';
        document.getElementById('col-low').innerHTML = '';

        auditData.forEach((data, i) => {
           if (data.reco.trim()) {
              const card = document.createElement('div');
              card.className = 'reco-card';
              card.innerHTML = `<h4>${criteria[i].name}</h4><div style="font-size:10px; font-weight:700;">${data.reco}</div><p>${data.prob}</p>`;
              
              if (data.sev >= 3) {
                 card.style.borderLeftColor = "var(--p-high)";
                 document.getElementById('col-high').appendChild(card);
              } else if (data.sev === 2) {
                 card.style.borderLeftColor = "var(--p-med)";
                 document.getElementById('col-med').appendChild(card);
              } else {
                 card.style.borderLeftColor = "var(--p-low)";
                 document.getElementById('col-low').appendChild(card);
              }
           }
        });
      }

      function openApp() {
        document.getElementById('app-overlay').style.display = "block";
        if (window.parent) window.parent.postMessage({ action: 'toggleFooter', visible: false }, '*');
      }
      function closeApp() {
        document.getElementById('app-overlay').style.display = "none";
        if (window.parent) window.parent.postMessage({ action: 'toggleFooter', visible: true }, '*');
      }

      window.addEventListener("message", function(e) {
        if (e.data.action === "closeApp") closeApp();
        if (e.data.action === "liveAuditUpdate") {
           const { index, data } = e.data;
           document.getElementById('prob-' + index).value = data.prob;
           document.getElementById('reco-' + index).value = data.reco;
           document.getElementById('sev-' + index).value = data.sev;
           updateState(index);
        }
      });

      init();
    </script>
  </body>
</html>
