<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      :root { --p-high: #e74c3c; --p-med: #f39c12; --p-low: #27ae60; }
      .slide-content {
        background-image: none !important;
        background-color: #ffffff;
        padding: 0 !important;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .workspace-header {
        background: var(--primary);
        color: white;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        z-index: 100;
      }
      .workspace-header h2 { font-size: 18px; font-weight: 800; margin: 0; display: flex; align-items: center; gap: 10px; }

      .main-layout { display: grid; grid-template-columns: 1fr 1.2fr; flex-grow: 1; overflow: hidden; }

      /* Grid Section */
      .grid-section { padding: 20px; overflow-y: auto; background: white; border-right: 1px solid #e2e8f0; }
      .audit-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
      .audit-table th { text-align: left; padding: 10px; border-bottom: 2px solid #8bc34a; color: var(--primary); font-weight: 800; font-size: 11px; text-transform: uppercase; }
      .audit-table td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }

      .crit-header { display: flex; flex-direction: column; gap: 4px; }
      .crit-name { font-weight: 800; color: var(--primary); font-size: 12px; display: flex; align-items: center; gap: 5px; }
      .btn-info { background: #f0f7f4; border: none; width: 18px; height: 18px; border-radius: 50%; color: var(--primary); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      .btn-info:hover { background: var(--primary); color: white; }
      .crit-def { font-size: 10px; color: #7f8c8d; font-style: italic; }

      .input-field { width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 11px; font-family: inherit; margin-bottom: 5px; }
      .input-field:focus { border-color: #8bc34a; outline: none; }
      .sev-select { padding: 5px; border-radius: 6px; font-weight: 800; border: 1px solid #cbd5e0; font-size: 11px; width: 50px; }
      .s-0 { color: #999; } .s-1 { color: #2ecc71; } .s-2 { color: #f1c40f; } .s-3 { color: #e67e22; } .s-4 { color: #e74c3c; }

      /* Kanban Section */
      .kanban-section { background: #f8faff; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
      .kanban-title { font-size: 13px; font-weight: 800; color: var(--primary); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
      
      .kanban-board { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; flex-grow: 1; }
      .kanban-col { background: #f1f4f8; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 400px; border: 1px solid #e2e8f0; }
      .col-header { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
      .high-col .col-header { color: var(--p-high); }
      .med-col .col-header { color: var(--p-med); }
      .low-col .col-header { color: var(--p-low); }

      .reco-card { background: white; padding: 12px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 4px solid #ccc; animation: popIn 0.3s ease; }
      .reco-card h4 { margin: 0 0 5px 0; font-size: 11px; color: var(--primary); font-weight: 800; }
      .reco-card p { margin: 0; font-size: 10px; color: #555; line-height: 1.4; }
      @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

      /* Buttons */
      .btn-action { background: #8bc34a; color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
      .btn-action:hover { transform: scale(1.05); }
      .btn-app { background: var(--primary); }

      /* Modals */
      .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 58, 68, 0.95); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 3000; }
      .modal-content { background: white; border-radius: 30px; position: relative; overflow: hidden; }
      .modal-close { position: absolute; top: 15px; right: 20px; width: 35px; height: 35px; border-radius: 50%; background: #eee; border: none; cursor: pointer; z-index: 100; font-size: 20px; display: flex; align-items: center; justify-content: center; }

      /* Didactic Info Modal */
      .didactic-box { background: white; width: 500px; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
      .didactic-box h3 { color: var(--primary); margin-bottom: 15px; font-size: 20px; }
      .didactic-box p { color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
    </style>
  </head>
  <body class="slide-content">
    <div class="workspace-header">
      <h2><iconify-icon icon="mdi:clipboard-pulse-outline"></iconify-icon> Workspace : Audit Bastien & Scapin</h2>
      <button class="btn-action btn-app" onclick="openApp()">
         <iconify-icon icon="mdi:rocket-launch"></iconify-icon> Lancer l'App à Auditer
      </button>
    </div>

    <div class="main-layout">
      <!-- Grid Section -->
      <div class="grid-section">
        <table class="audit-table">
          <thead>
            <tr>
              <th style="width: 150px;">Critère B&S</th>
              <th>Problème & Recommandation</th>
              <th style="width: 60px;">Sév.</th>
            </tr>
          </thead>
          <tbody id="audit-grid-body"></tbody>
        </table>
      </div>

      <!-- Kanban Section -->
      <div class="kanban-section">
        <div class="kanban-title">Backlog UX : Recommandations Priorisées</div>
        <div class="kanban-board">
           <div class="kanban-col high-col">
              <div class="col-header"><iconify-icon icon="mdi:fire"></iconify-icon> Haute Priorité</div>
              <div id="col-high" class="col-items"></div>
           </div>
           <div class="kanban-col med-col">
              <div class="col-header"><iconify-icon icon="mdi:clock-alert-outline"></iconify-icon> Priorité Moyenne</div>
              <div id="col-med" class="col-items"></div>
           </div>
           <div class="kanban-col low-col">
              <div class="col-header"><iconify-icon icon="mdi:check-circle-outline"></iconify-icon> Basse Priorité</div>
              <div id="col-low" class="col-items"></div>
           </div>
        </div>
      </div>
    </div>

    <!-- App Modal -->
    <div id="app-modal" class="modal-overlay">
       <div class="modal-content" style="width: 98%; height: 96vh; border: 10px solid #222;">
          <button class="modal-close" onclick="closeApp()">×</button>
          <iframe src="lab/complex_bad_app.html" style="width: 100%; height: 100%; border: none;"></iframe>
       </div>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal-overlay">
       <div class="didactic-box">
          <h3 id="info-title"></h3>
          <p id="info-text"></p>
          <button class="btn-action" style="margin: 0 auto;" onclick="closeInfo()">J'ai compris</button>
       </div>
    </div>

    <script>
      const criteriaData = [
        { name: "1. Guidage", def: "Orienter et informer.", long: "L'ensemble des moyens mis en œuvre pour conseiller, orienter, informer et conduire l'utilisateur lors de ses interactions (messages, labels, retours d'état)." },
        { name: "2. Charge de travail", def: "Réduire l'effort mental.", long: "Ensemble des éléments de l'interface qui sollicitent l'attention, la mémoire et l'effort de l'utilisateur. Vise à optimiser le temps de saisie." },
        { name: "3. Contrôle explicite", def: "Maîtrise utilisateur.", long: "Le système doit donner à l'utilisateur le sentiment qu'il contrôle les actions système. Rien ne doit se passer sans son consentement." },
        { name: "4. Adaptabilité", def: "Flexibilité selon l'usage.", long: "Capacité de l'interface à réagir selon le contexte d'utilisation et les besoins spécifiques de l'utilisateur (expert vs novice)." },
        { name: "5. Gestion des erreurs", def: "Prévenir et corriger.", long: "Moyens permettant d'éviter les erreurs ou de les corriger simplement. La qualité des messages d'erreur est ici cruciale." },
        { name: "6. Homogénéité", def: "Cohérence interne.", long: "Les mêmes choix de conception (codes, libellés, mise en page) pour des contextes identiques sur tout le portail." },
        { name: "7. Signifiance des codes", def: "Sémantique visuelle.", long: "Rapport entre les codes (icônes, couleurs, abréviations) et les objets ou actions qu'ils représentent. Pas d'ambiguïté." },
        { name: "8. Compatibilité", def: "Accord métier/système.", long: "Accord entre les caractéristiques de l'utilisateur (mémoire, attentes) et les tâches réelles qu'il effectue au quotidien." }
      ];

      function init() {
        const body = document.getElementById('audit-grid-body');
        criteriaData.forEach((c, i) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>
               <div class="crit-header">
                  <div class="crit-name">${c.name} <button class="btn-info" onclick="openInfo(${i})">i</button></div>
                  <div class="crit-def">${c.def}</div>
               </div>
            </td>
            <td>
               <input type="text" class="input-field" placeholder="Problème identifié..." id="prob-${i}" oninput="refreshKanban()">
               <input type="text" class="input-field" placeholder="Recommandation (optionnelle)..." id="reco-${i}" oninput="refreshKanban()">
            </td>
            <td>
              <select class="sev-select s-0" id="sev-${i}" onchange="this.className='sev-select s-'+this.value; refreshKanban()">
                <option value="0" class="s-0">0</option><option value="1" class="s-1">1</option><option value="2" class="s-2">2</option><option value="3" class="s-3">3</option><option value="4" class="s-4">4</option>
              </select>
            </td>
          `;
          body.appendChild(row);
        });
      }

      function refreshKanban() {
        document.getElementById('col-high').innerHTML = '';
        document.getElementById('col-med').innerHTML = '';
        document.getElementById('col-low').innerHTML = '';

        criteriaData.forEach((c, i) => {
           const prob = document.getElementById('prob-' + i).value;
           const reco = document.getElementById('reco-' + i).value;
           const sev = parseInt(document.getElementById('sev-' + i).value);

           if (reco.trim()) {
              const card = document.createElement('div');
              card.className = 'reco-card';
              card.innerHTML = `<h4>${c.name}</h4><p>${reco}</p>`;
              
              if (sev >= 3) {
                 card.style.borderLeftColor = "var(--p-high)";
                 document.getElementById('col-high').appendChild(card);
              } else if (sev === 2) {
                 card.style.borderLeftColor = "var(--p-med)";
                 document.getElementById('col-med').appendChild(card);
              } else {
                 card.style.borderLeftColor = "var(--p-low)";
                 document.getElementById('col-low').appendChild(card);
              }
           }
        });
      }

      function openApp() {
        document.getElementById('app-modal').style.display = "flex";
        if (window.parent) window.parent.postMessage({ action: 'toggleFooter', visible: false }, '*');
      }
      function closeApp() {
        document.getElementById('app-modal').style.display = "none";
        if (window.parent) window.parent.postMessage({ action: 'toggleFooter', visible: true }, '*');
      }

      function openInfo(i) {
        const c = criteriaData[i];
        document.getElementById('info-title').innerText = c.name;
        document.getElementById('info-text').innerText = c.long;
        document.getElementById('info-modal').style.display = "flex";
      }
      function closeInfo() { document.getElementById('info-modal').style.display = "none"; }

      init();
    </script>
  </body>
</html>
