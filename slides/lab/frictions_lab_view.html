<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background: #f8f9fa;
        padding: 30px;
        margin: 0;
        overflow-x: hidden;
      }

      .lab-header {
        background: #1e3a44;
        color: white;
        padding: 20px 30px;
        border-radius: 20px;
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 10px 20px rgba(30, 58, 68, 0.1);
      }

      .game-instruction { font-size: 14px; font-weight: 400; max-width: 70%; }
      .btn-verify {
        background: #8bc34a;
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 50px;
        font-weight: 800;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .btn-verify:hover { background: #7eb344; transform: translateY(-2px); }

      .game-board {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 30px;
        align-items: start;
      }

      /* Friction Pool */
      .pool-container {
        background: white;
        padding: 20px;
        border-radius: 20px;
        border: 2px dashed #cbd5e0;
        min-height: 500px;
      }
      .pool-title { font-size: 13px; font-weight: 800; color: #718096; text-transform: uppercase; margin-bottom: 20px; text-align: center; }

      .friction-card {
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        cursor: grab;
        margin-bottom: 12px;
        font-weight: 700;
        font-size: 12px;
        color: #444;
        border: 1px solid #e2e8f0;
        transition: transform 0.2s, box-shadow 0.2s;
        user-select: none;
      }
      .friction-card:active { cursor: grabbing; }
      .friction-card.dragging { opacity: 0.5; }

      /* Drop Zones */
      .zones-container { display: flex; flex-direction: column; gap: 20px; }
      .drop-zone {
        border-radius: 20px;
        padding: 20px;
        min-height: 120px;
        border: 2px dashed transparent;
        transition: all 0.3s;
        position: relative;
      }
      .drop-zone.over { border-color: #1e3a44; background: rgba(30, 58, 68, 0.05); }

      .zone-header { font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
      .zone-items { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

      .major-zone { background: #fff5f5; border-color: #feb2b2; }
      .major-zone .zone-header { color: #c53030; }
      
      .moderate-zone { background: #fffaf0; border-color: #fbd38d; }
      .moderate-zone .zone-header { color: #c05621; }
      
      .minor-zone { background: #f0fff4; border-color: #9ae6b4; }
      .minor-zone .zone-header { color: #2f855a; }

      /* Correct/Wrong indicators */
      .friction-card.correct { border-color: #48bb78 !important; background: #f0fff4; }
      .friction-card.wrong { border-color: #f56565 !important; background: #fff5f5; }

      /* Reveal Modal */
      .reveal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(30, 58, 68, 0.95); backdrop-filter: blur(8px);
        display: none; justify-content: center; align-items: center; z-index: 4000;
      }
      .reveal-content {
        background: white; width: 400px; padding: 40px; border-radius: 30px;
        text-align: center; position: relative; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .emoji-display { font-size: 80px; margin-bottom: 20px; display: block; }
      .severity-tag { display: inline-block; padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 15px; }
      .tag-4 { background: #000; color: #ffeb3b; }
      .tag-3 { background: #c53030; color: white; }
      .tag-2 { background: #f6ad55; color: white; }
      .tag-1 { background: #8bc34a; color: white; }
    </style>
  </head>
  <body>
    <div class="lab-header">
      <div class="game-instruction">
        <strong>Défi Priorisation :</strong> Glissez les frictions ci-dessous dans la bonne catégorie de sévérité (Majeure, Modérée, Mineure) pour tester vos connaissances d'auditeur.
      </div>
      <button class="btn-verify" onclick="verifyChoices()">
        <iconify-icon icon="mdi:check-all"></iconify-icon> Vérifier mes choix
      </button>
    </div>

    <div class="game-board">
      <div class="pool-container">
        <div class="pool-title">Frictions à classer</div>
        <div id="pool" class="zone-items" style="grid-template-columns: 1fr;"></div>
      </div>

      <div class="zones-container">
        <div class="drop-zone major-zone" data-zone="major">
          <div class="zone-header"><iconify-icon icon="mdi:alert-decagram"></iconify-icon> 1. Frictions MAJEURES (Critiques)</div>
          <div class="zone-items"></div>
        </div>
        <div class="drop-zone moderate-zone" data-zone="moderate">
          <div class="zone-header"><iconify-icon icon="mdi:alert-circle"></iconify-icon> 2. Frictions MODÉRÉES (Pénibles)</div>
          <div class="zone-items"></div>
        </div>
        <div class="drop-zone minor-zone" data-zone="minor">
          <div class="zone-header"><iconify-icon icon="mdi:alert-outline"></iconify-icon> 3. Frictions MINEURES (Irritantes)</div>
          <div class="zone-items"></div>
        </div>
      </div>
    </div>

    <!-- Feedback Modal -->
    <div id="reveal-modal" class="reveal-overlay">
       <div class="reveal-content">
          <span class="emoji-display" id="rev-emoji"></span>
          <div class="severity-tag" id="rev-tag"></div>
          <h3 id="rev-title" style="font-size: 18px; font-weight: 800; color: #1e3a44; margin-bottom: 10px;"></h3>
          <p id="rev-desc" style="font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 20px;"></p>
          <button style="background: #f0f0f0; border: none; padding: 10px 25px; border-radius: 50px; font-weight: 700; cursor: pointer;" onclick="closeReveal()">Continuer</button>
       </div>
    </div>

    <script>
      const frictions = [
        { id: 1, cat: "major", t: "Authentification : parcours bloquant", d: "C'est une catastrophe (Niveau 4). L'utilisateur ne peut même pas accéder au service. Action : Bloquer la prod.", e: "🤬", g: 4, l: "Catastrophe" },
        { id: 2, cat: "major", t: "Upload documents : tailles limitées", d: "Problème Majeur (Niveau 3). Empêche la finalisation du dossier. Action : Priorité haute.", e: "😡", g: 3, l: "Majeur" },
        { id: 3, cat: "major", t: "Documents officiels non ré-éditables", d: "Problème Majeur (Niveau 3). Crucial pour la conformité GUCE. Action : Priorité haute.", e: "😡", g: 3, l: "Majeur" },
        { id: 4, cat: "moderate", t: "Navigation complexe / perte repères", d: "Problème Modéré (Niveau 2). Augmente la charge mentale. Action : Prochain sprint.", e: "😠", g: 2, l: "Modéré" },
        { id: 5, cat: "moderate", t: "Messages d'erreur non actionnables", d: "Problème Modéré (Niveau 2). Laisse l'utilisateur dans l'impasse. Action : Prochain sprint.", e: "😠", g: 2, l: "Modéré" },
        { id: 6, cat: "moderate", t: "Délais de traitement opaques", d: "Problème Modéré (Niveau 2). Manque de visibilité (H1). Action : Prochain sprint.", e: "😠", g: 2, l: "Modéré" },
        { id: 7, cat: "minor", t: "Re-saisie (pas de sauvegarde auto)", d: "Problème Mineur (Niveau 1). Agaçant mais n'empêche pas la réussite. Action : Si possible.", e: "😕", g: 1, l: "Mineur" },
        { id: 8, cat: "minor", t: "Absence d'estimation des délais", d: "Problème Mineur (Niveau 1). Confort utilisateur réduit. Action : Si possible.", e: "😕", g: 1, l: "Mineur" },
        { id: 9, cat: "minor", t: "Format unique (PDF) non flexible", d: "Problème Cosmétique/Mineur (Niveau 1). Contrainte externe mineure. Action : Si possible.", e: "😕", g: 1, l: "Mineur" }
      ];

      function init() {
        const pool = document.getElementById('pool');
        // Shuffle pool
        const shuffled = [...frictions].sort(() => Math.random() - 0.5);
        shuffled.forEach(f => {
          const card = document.createElement('div');
          card.className = 'friction-card';
          card.draggable = true;
          card.id = 'f-' + f.id;
          card.innerText = f.t;
          card.setAttribute('data-id', f.id);
          card.addEventListener('dragstart', dragStart);
          card.addEventListener('dragend', dragEnd);
          pool.appendChild(card);
        });

        document.querySelectorAll('.drop-zone').forEach(zone => {
          zone.addEventListener('dragover', dragOver);
          zone.addEventListener('dragenter', dragEnter);
          zone.addEventListener('dragleave', dragLeave);
          zone.addEventListener('drop', drop);
        });
      }

      let draggedItem = null;

      function dragStart() { draggedItem = this; setTimeout(() => this.classList.add('dragging'), 0); }
      function dragEnd() { this.classList.remove('dragging'); draggedItem = null; }
      function dragOver(e) { e.preventDefault(); }
      function dragEnter(e) { e.preventDefault(); this.classList.add('over'); }
      function dragLeave() { this.classList.remove('over'); }
      function drop() {
        this.classList.remove('over');
        this.querySelector('.zone-items').appendChild(draggedItem);
      }

      function verifyChoices() {
        let allCorrect = true;
        document.querySelectorAll('.friction-card').forEach(card => {
          const fId = card.getAttribute('data-id');
          const f = frictions.find(item => item.id == fId);
          const zone = card.parentElement.parentElement.getAttribute('data-zone');
          
          if (zone === f.cat) {
            card.classList.add('correct');
            card.classList.remove('wrong');
          } else {
            card.classList.add('wrong');
            allCorrect = false;
          }
          
          // Make clickable for detail after verify
          card.onclick = () => showDetail(f);
        });

        if (allCorrect) {
          alert("Bravo ! Vous avez parfaitement priorisé toutes les frictions.");
        } else {
          alert("Certaines frictions sont mal classées. Cliquez sur les cartes pour voir les explications.");
        }
      }

      function showDetail(f) {
        document.getElementById('rev-emoji').innerText = f.e;
        document.getElementById('rev-title').innerText = f.t;
        document.getElementById('rev-desc').innerText = f.d;
        const tag = document.getElementById('rev-tag');
        tag.innerText = "Niveau " + f.g + " : " + f.l;
        tag.className = "severity-tag tag-" + f.g;
        document.getElementById('reveal-modal').style.display = "flex";
      }

      function closeReveal() { document.getElementById('reveal-modal').style.display = "none"; }
      init();
    </script>
  </body>
</html>
