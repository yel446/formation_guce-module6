<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background: #ffffff;
        padding: 30px;
        margin: 0;
        overflow-x: hidden;
      }

      .lab-intro {
        background: #1e3a44;
        color: white;
        padding: 15px 25px;
        border-radius: 15px;
        margin-bottom: 30px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 15px;
        box-shadow: 0 10px 20px rgba(30, 58, 68, 0.1);
      }

      .friction-board {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .friction-row {
        border-radius: 20px;
        padding: 20px;
        border: 2px solid transparent;
        transition: all 0.3s;
      }

      .row-header {
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .row-items {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
      }

      .friction-card {
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
        font-weight: 700;
        font-size: 13px;
        color: #444;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 80px;
        border: 1px solid #f0f0f0;
      }

      .friction-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        border-color: #8bc34a;
      }

      /* Levels Styling */
      .major-row { background: #fff5f5; border-color: #feb2b2; }
      .major-row .row-header { color: #c53030; }
      
      .moderate-row { background: #fffaf0; border-color: #fbd38d; }
      .moderate-row .row-header { color: #c05621; }
      
      .minor-row { background: #f0fff4; border-color: #9ae6b4; }
      .minor-row .row-header { color: #2f855a; }

      /* Reveal Overlay */
      .reveal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(30, 58, 68, 0.95); backdrop-filter: blur(8px);
        display: none; justify-content: center; align-items: center; z-index: 3000;
      }
      .reveal-content {
        background: white; width: 400px; padding: 40px; border-radius: 30px;
        text-align: center; position: relative; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

      .emoji-display { font-size: 80px; margin-bottom: 20px; display: block; }
      .severity-tag {
        display: inline-block; padding: 5px 15px; border-radius: 50px;
        font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 15px;
      }
      .tag-4 { background: #000; color: #ffeb3b; }
      .tag-3 { background: #c53030; color: white; }
      .tag-2 { background: #f6ad55; color: white; }
      .tag-1 { background: #8bc34a; color: white; }

      .reveal-title { font-size: 18px; font-weight: 800; color: #1e3a44; margin-bottom: 10px; }
      .reveal-desc { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 20px; }
      .btn-close {
        background: #f0f0f0; border: none; padding: 10px 25px; border-radius: 50px;
        font-weight: 700; cursor: pointer; transition: 0.3s;
      }
      .btn-close:hover { background: #1e3a44; color: white; }
    </style>
  </head>
  <body>
    <div class="lab-intro">
      <iconify-icon icon="mdi:emoticon-angry" style="font-size: 24px; color: #8bc34a;"></iconify-icon>
      <div>
        <strong>Mini-Lab Interactif :</strong> Cliquez sur une friction pour découvrir son niveau de sévérité et le ressenti utilisateur associé.
      </div>
    </div>

    <div class="friction-board">
      <div class="friction-row major-row">
        <div class="row-header"><iconify-icon icon="mdi:alert-decagram"></iconify-icon> 1. Frictions MAJEURES (Critiques)</div>
        <div class="row-items" id="major-items"></div>
      </div>
      <div class="friction-row moderate-row">
        <div class="row-header"><iconify-icon icon="mdi:alert-circle"></iconify-icon> 2. Frictions MODÉRÉES (Pénibles)</div>
        <div class="row-items" id="moderate-items"></div>
      </div>
      <div class="friction-row minor-row">
        <div class="row-header"><iconify-icon icon="mdi:alert-outline"></iconify-icon> 3. Frictions MINEURES (Irritantes)</div>
        <div class="row-items" id="minor-items"></div>
      </div>
    </div>

    <div id="reveal-modal" class="reveal-overlay">
       <div class="reveal-content">
          <span class="emoji-display" id="rev-emoji"></span>
          <div class="severity-tag" id="rev-tag"></div>
          <h3 class="reveal-title" id="rev-title"></h3>
          <p class="reveal-desc" id="rev-desc"></p>
          <button class="btn-close" onclick="closeReveal()">J'ai compris</button>
       </div>
    </div>

    <script>
      const data = {
        major: [
          { t: "Authentification : parcours non fluide", d: "Interruption du flux métier dès le début du processus. Impact direct sur l'abandon.", e: "🤬", g: 4, l: "Catastrophe" },
          { t: "Upload documents : tailles limitées", d: "Empêche la soumission du dossier. Friction bloquante et frustrante.", e: "😡", g: 3, l: "Majeur" },
          { t: "Documents officiels non ré-éditables", d: "Oblige à recommencer tout le parcours pour une simple faute.", e: "😡", g: 3, l: "Majeur" }
        ],
        moderate: [
          { t: "Navigation complexe / perte repères", d: "L'utilisateur perd le fil de son action. Augmentation de la charge mentale.", e: "😠", g: 2, l: "Modéré" },
          { t: "Messages d'erreur non actionnables", d: "Signale un problème sans donner la clé pour le résoudre.", e: "😠", g: 2, l: "Modéré" },
          { t: "Délais de traitement opaques", d: "Incertitude sur l'avancement. Manque de visibilité (H1).", e: "😠", g: 2, l: "Modéré" }
        ],
        minor: [
          { t: "Re-saisie (pas de sauvegarde auto)", d: "Action répétitive agaçante mais n'empêchant pas la tâche.", e: "😕", g: 1, l: "Mineur" },
          { t: "Absence d'estimation des délais", d: "Incertitude légère sur le moment de finalisation.", e: "😕", g: 1, l: "Mineur" },
          { t: "Format unique (PDF) non flexible", d: "Contrainte technique mineure demandant un effort externe.", e: "😕", g: 1, l: "Mineur" }
        ]
      };

      function init() {
        ['major', 'moderate', 'minor'].forEach(cat => {
          document.getElementById(cat + '-items').innerHTML = data[cat].map((item, i) => `
            <div class="friction-card" onclick="openReveal('${cat}', ${i})">${item.t}</div>
          `).join('');
        });
      }

      function openReveal(cat, index) {
        const item = data[cat][index];
        document.getElementById('rev-emoji').innerText = item.e;
        document.getElementById('rev-title').innerText = item.t;
        document.getElementById('rev-desc').innerText = item.d;
        const tag = document.getElementById('rev-tag');
        tag.innerText = "Niveau " + item.g + " : " + item.l;
        tag.className = "severity-tag tag-" + item.g;
        document.getElementById('reveal-modal').style.display = "flex";
      }

      function closeReveal() { document.getElementById('reveal-modal').style.display = "none"; }
      init();
    </script>
  </body>
</html>
